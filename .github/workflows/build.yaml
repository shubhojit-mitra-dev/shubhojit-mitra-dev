name: README build
on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 1
          token: ${{ secrets.ACCESS_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update README dynamic SVGs
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: ${{ secrets.USER_NAME }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python today.py

      - name: Update cache-buster in README
        run: |
          SHA=$(git rev-parse --short HEAD)
          sed -i "s|dark_mode\.svg[^\"]*|dark_mode.svg?v=${SHA}|g" README.md
          sed -i "s|light_mode\.svg[^\"]*|light_mode.svg?v=${SHA}|g" README.md

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions-bot"
          git config --global user.email "github-actions-bot@users.noreply.github.com"
          git add dark_mode.svg light_mode.svg cache/ README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update profile stats [skip ci]" && git push)

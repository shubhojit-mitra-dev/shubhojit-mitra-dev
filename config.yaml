# Neofetch README SVG Configuration

profile:
  username: "shubhojit-mitra-dev"
  birthday: "2005-11-10" # Used for calculating Uptime / Age
  
theme:
  font_family: "ui-monospace, 'DejaVu Sans Mono', 'Liberation Mono', Consolas, monospace"
  right_align_x: 450
  ascii_font_size: "10.5px"
  right_font_size: "13px"
  width: "985px"
  height: "650px"
  
  # Dark mode colors
  dark:
    bg: "#161b22"
    text: "#c9d1d9"
    key: "#ffa657"     # Orange-accented keys
    value: "#a5d6ff"   # Blue-accented values
    dots: "#616e7f"    # Gray separator dots
    add: "#3fb950"     # Green additions
    delete: "#f85149"  # Red deletions
    ascii: "#c9d1d9"   # White/gray ASCII art color
    
  # Light mode colors
  light:
    bg: "#f6f8fa"
    text: "#24292f"
    key: "#953800"
    value: "#0a3069"
    dots: "#c2cfde"
    add: "#1a7f37"
    delete: "#cf222e"
    ascii: "#24292f"

# The layout and data displayed in the right column of the SVG card
# Note: Key-value lines are formatted as: ". Key: ...... Value"
# Dots are automatically calculated to pad/justify the text.
layout:
  header: "shubhojitmitra@dev"
  
  system:
    - key: "OS"
      value: "Linux (I use Arch btw!)"
    - key: "Uptime"
      value: "[UPTIME]" # Special placeholder, will be replaced with dynamic age
